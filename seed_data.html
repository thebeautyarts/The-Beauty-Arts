// วันหยุด
const HOLIDAYS = {
  // เม.ย.
  'apr2569_2025-04-02': {reason:'วันหยุด', date:'2025-04-02'},
  'apr2569_2025-04-12': {reason:'หยุดสงกรานต์', date:'2025-04-12'},
  'apr2569_2025-04-13': {reason:'หยุดสงกรานต์', date:'2025-04-13'},
  'apr2569_2025-04-14': {reason:'หยุดสงกรานต์', date:'2025-04-14'},
  'apr2569_2025-04-22': {reason:'วันหยุด', date:'2025-04-22'},
  // พ.ค.
  'may2569_2025-05-09': {reason:'วันหยุด', date:'2025-05-09'},
  'may2569_2025-05-10': {reason:'วันหยุด', date:'2025-05-10'},
  'may2569_2025-05-11': {reason:'วันหยุด', date:'2025-05-11'},
  'may2569_2025-05-25': {reason:'วันหยุด', date:'2025-05-25'},
  // มิ.ย.
  'jun2569_2025-06-04': {reason:'วันหยุด', date:'2025-06-04'},
};

window.startSeed = async function() {
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังโหลด...';

  log('<span class="info">═══════════════════════════════════════</span>');
  log('<span class="info">🌱 เริ่มโหลดข้อมูลย้อนหลัง</span>');
  log('<span class="info">═══════════════════════════════════════</span>');

  const allMonths = Object.entries(MONTHS_DATA);
  let totalDays = allMonths.reduce((s,[,m])=>s+Object.keys(m.days).length,0);
  totalDays += Object.keys(HOLIDAYS).length;
  let done = 0;
  let successCount = 0, failCount = 0;
  const summaryLines = [];

  // Load days
  for (const [mk, monthObj] of allMonths) {
    log(`<br><span class="info">📅 ${monthObj.label} (${Object.keys(monthObj.days).length} วัน)</span>`);
    for (const [dayNum, data] of Object.entries(monthObj.days)) {
      data.updatedAt = new Date().toISOString();
      try {
        await set(ref(db, `months/${mk}/${dayNum}`), data);
        const svcTotal = Object.values(data.svc).reduce((a,b)=>a+b,0);
        log(`  <span class="ok">✓</span> วันที่ ${String(dayNum).padStart(2,' ')} — ฿${svcTotal.toLocaleString('th-TH')} ${data.note?'('+data.note+')':''}`);
        summaryLines.push({mk, day:dayNum, total:svcTotal, note:data.note});
        successCount++;
      } catch(e) {
        log(`  <span class="err">✗</span> วันที่ ${dayNum} ERROR: ${e.message}`, 'err');
        failCount++;
      }
      done++;
      pbar.style.width = (done/totalDays*100)+'%';
      await new Promise(r=>setTimeout(r,80)); // small delay
    }
  }

  // Load holidays
  log(`<br><span class="info">🏖️ วันหยุด (${Object.keys(HOLIDAYS).length} วัน)</span>`);
  for (const [key, hol] of Object.entries(HOLIDAYS)) {
    try {
      const dateKey = hol.date.replace(/-/g,'_');
      await set(ref(db, `holidays/${dateKey}`), hol);
      log(`  <span class="ok">✓</span> ${hol.date} — ${hol.reason}`);
      successCount++;
    } catch(e) {
      log(`  <span class="err">✗</span> ${key}: ${e.message}`);
      failCount++;
    }
    done++;
    pbar.style.width = (done/totalDays*100)+'%';
    await new Promise(r=>setTimeout(r,50));
  }

  pbar.style.width = '100%';

  // Summary
  log('<br><span class="info">═══════════════════════════════════════</span>');
  log(`<span class="${failCount===0?'ok':'warn'}">สรุป: สำเร็จ ${successCount} รายการ | ล้มเหลว ${failCount} รายการ</span>`);
  log('<span class="info">═══════════════════════════════════════</span>');

  // Show summary card
  const totals = {apr2569:0, may2569:0, jun2569:0};
  summaryLines.forEach(({mk,total}) => { if(totals[mk]!==undefined) totals[mk]+=total; });
  const summaryEl = document.getElementById('summary');
  summaryEl.style.display = 'block';
  document.getElementById('summary-content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;">
      <div style="background:#fffbeb;border-radius:8px;padding:12px;text-align:center;border:1px solid #fde68a;">
        <div style="font-size:11px;font-weight:700;color:#92400e;">เมษายน 2569</div>
        <div style="font-size:18px;font-weight:700;color:#92400e;">฿${totals.apr2569.toLocaleString('th-TH')}</div>
        <div style="font-size:11px;color:#888;">7 วันทำงาน</div>
      </div>
      <div style="background:#f0fdf4;border-radius:8px;padding:12px;text-align:center;border:1px solid #bbf7d0;">
        <div style="font-size:11px;font-weight:700;color:#065f46;">พฤษภาคม 2569</div>
        <div style="font-size:18px;font-weight:700;color:#065f46;">฿${totals.may2569.toLocaleString('th-TH')}</div>
        <div style="font-size:11px;color:#888;">5 วันทำงาน</div>
      </div>
      <div style="background:#e0f2fe;border-radius:8px;padding:12px;text-align:center;border:1px solid #bae6fd;">
        <div style="font-size:11px;font-weight:700;color:#0c4a6e;">มิถุนายน 2569</div>
        <div style="font-size:18px;font-weight:700;color:#0c4a6e;">฿${totals.jun2569.toLocaleString('th-TH')}</div>
        <div style="font-size:11px;color:#888;">8 วันทำงาน</div>
      </div>
    </div>
    <div style="font-size:13px;color:#475569;">
      <strong>หมายเหตุ:</strong> ข้อมูลถูกบันทึกใน Firebase path <code>months/{เดือน}/{วัน}</code><br>
      เปิด <a href="https://thebeautyarts.github.io/The-Beauty-Arts/" target="_blank" style="color:#0ea5e9;">ระบบหลัก</a> แล้วเลือกเดือนที่ต้องการดูได้เลย
    </div>
  `;

  btn.textContent = '✅ โหลดเสร็จแล้ว';

};
