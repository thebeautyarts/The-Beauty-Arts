window.startSeed=async function(){
  const btn=document.getElementById("btn");
  btn.disabled=true;btn.textContent="⏳ กำลังโหลด...";
  const dates=Object.entries(DATA);
  const total=dates.reduce((s,[,bks])=>s+Object.keys(bks).length,0);
  let done=0,ok=0,fail=0;
  log("<span class=info>📅 โหลดข้อมูลการจอง "+total+" รายการ จาก "+dates.length+" วัน</span>");
  for(const[dateKey,bks] of dates){
    const dateLabel=dateKey.replace(/_/g,'-');
    log(`<br><span class=info>${dateLabel} (${Object.keys(bks).length} รายการ)</span>`);
    for(const[bkId,bkData] of Object.entries(bks)){
      bkData.updatedAt=new Date().toISOString();
      const path=`kk_branch/bookings/${dateKey}/${bkId}`;
      try{
        await set(ref(db,path),bkData);
        const priceStr=bkData.price?` | ฿${bkData.price.toLocaleString("th-TH")}`:'';
        log(`  <span class=ok>✓</span> ${bkData.time} ${bkData.name} — ${bkData.service}${priceStr}`);
        ok++;
      }catch(e){
        log(`  <span class=err>✗</span> ${path}: ${e.message}`);
        fail++;
      }
      done++;P.style.width=(done/total*100)+"%";
      await new Promise(r=>setTimeout(r,80));
    }
  }
  P.style.width="100%";
  log(`<br><span class=info>═══ สำเร็จ ${ok} | ล้มเหลว ${fail} ═══</span>`);
  if(fail===0){btn.textContent="✅ โหลดสำเร็จ!";btn.style.background="#16a34a";document.getElementById("sum").style.display="block";}
  else{btn.textContent="❌ มีข้อผิดพลาด — กดลองใหม่";btn.disabled=false;}
};
