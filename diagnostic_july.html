<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🔍 ตรวจสอบ/ล้างข้อมูล jul2569</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f8fafc;margin:0;padding:20px;color:#0f172a}
  h1{font-size:18px;color:#0c4a6e}
  .day-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px}
  .day-card.suspect{border-color:#f87171;background:#fef2f2}
  .day-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:8px}
  pre{background:#0f172a;color:#e2e8f0;padding:10px;border-radius:6px;font-size:11px;overflow:auto;max-height:300px}
  button{background:#dc2626;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px}
  button:hover{background:#b91c1c}
  .status{padding:10px;border-radius:8px;margin-bottom:14px;font-size:13px}
  .ok{background:#f0fdf4;color:#166534}
  .warn{background:#fffbeb;color:#92400e}
</style>
</head>
<body>
<h1>🔍 ตรวจสอบข้อมูลเดือนกรกฎาคม 2569 (jul2569)</h1>
<div id="status" class="status warn">กำลังโหลดข้อมูล...</div>
<div id="days"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuTHvh-4KJzrmjbmmu0RQaiW3RGzFrbGQ",
  authDomain: "the-beauty-arts.firebaseapp.com",
  databaseURL: "https://the-beauty-arts-default-rtdb.asia-southeast1.firebasedatabase.app"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const todayReal = new Date(); // วันที่จริงของเครื่อง
const todayDay = todayReal.getDate();

async function run() {
  const snap = await get(ref(db, 'jul2569'));
  const val = snap.val();
  const statusEl = document.getElementById('status');
  const daysEl = document.getElementById('days');

  if (!val) {
    statusEl.textContent = '✅ jul2569 ยังไม่มีข้อมูลเลย (ว่างเปล่า) — ไม่มีอะไรต้องล้าง';
    statusEl.className = 'status ok';
    return;
  }

  // normalize เหมือนระบบหลัก
  const days = {};
  if (Array.isArray(val)) {
    val.forEach((item, idx) => { if (item && idx > 0) days[idx] = item; });
  } else {
    Object.keys(val).forEach(k => {
      if (k.startsWith('_')) return; // ข้าม metadata เช่น _syncedBkIds ที่ระดับบนสุด (ไม่ควรมี แต่กันไว้)
      let num = k.startsWith('d') ? parseInt(k.slice(1)) : parseInt(k);
      if (!isNaN(num)) days[num] = val[k];
    });
  }

  const dayNums = Object.keys(days).map(Number).sort((a,b)=>a-b);
  statusEl.innerHTML = `พบข้อมูล ${dayNums.length} วัน ในเดือนกรกฎาคม (วันนี้คือวันที่ ${todayDay}) — วันที่มากกว่า ${todayDay} คือวันในอนาคตที่ไม่ควรมีข้อมูลแล้ว จะไฮไลท์สีแดงไว้ให้`;
  statusEl.className = dayNums.some(d=>d>todayDay) ? 'status warn' : 'status ok';

  daysEl.innerHTML = dayNums.map(d => {
    const dd = days[d];
    const isSuspect = d > todayDay;
    return `<div class="day-card ${isSuspect?'suspect':''}" id="card-${d}">
      <div class="day-head">
        <span>${isSuspect?'⚠️ ':''}วันที่ ${d}/07/2569 ${isSuspect?'(อนาคต — ไม่ควรมีข้อมูล)':''}</span>
        <button onclick="window.deleteDay(${d})">🗑️ ลบวันนี้ทิ้ง</button>
      </div>
      <pre>${JSON.stringify(dd, null, 2)}</pre>
    </div>`;
  }).join('');
}

window.deleteDay = async function(d) {
  if (!confirm(`ยืนยันลบข้อมูลวันที่ ${d}/07/2569 ทิ้งทั้งหมด?`)) return;
  await remove(ref(db, `jul2569/${d}`));
  document.getElementById(`card-${d}`).remove();
  alert(`ลบวันที่ ${d} เรียบร้อยแล้วค่ะ`);
};

run();
</script>
</body>
</html>
