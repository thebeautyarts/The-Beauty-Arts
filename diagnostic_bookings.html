<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🔍 ตรวจสอบคิวจอง เดือนกรกฎาคม</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f8fafc;margin:0;padding:20px;color:#0f172a}
  h1{font-size:18px;color:#0c4a6e}
  .bk-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px}
  .bk-card.suspect{border-color:#f87171;background:#fef2f2}
  .bk-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:8px;flex-wrap:wrap;gap:8px}
  .bk-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#fee2e2;color:#dc2626;font-weight:600}
  pre{background:#0f172a;color:#e2e8f0;padding:10px;border-radius:6px;font-size:11px;overflow:auto;max-height:220px;margin:0}
  button{background:#dc2626;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;margin-left:6px}
  button.status-btn{background:#0c4a6e}
  button:hover{opacity:0.85}
  .status{padding:10px;border-radius:8px;margin-bottom:14px;font-size:13px}
  .ok{background:#f0fdf4;color:#166534}
  .warn{background:#fffbeb;color:#92400e}
</style>
</head>
<body>
<h1>🔍 ตรวจสอบคิวจองเดือนกรกฎาคม 2026 (path: bookings)</h1>
<div id="status" class="status warn">กำลังโหลดข้อมูล...</div>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuTHvh-4KJzrmjbmmu0RQaiW3RGzFrbGQ",
  authDomain: "the-beauty-arts.firebaseapp.com",
  databaseURL: "https://the-beauty-arts-default-rtdb.asia-southeast1.firebasedatabase.app"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const todayStr = new Date().toISOString().slice(0,10); // YYYY-MM-DD จริงของเครื่อง

let allBookings = {};

async function run() {
  const snap = await get(ref(db, 'bookings'));
  const val = snap.val() || {};
  allBookings = val;
  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('list');

  // กรองเฉพาะคิวเดือนกรกฎาคม 2026 (date ขึ้นต้นด้วย 2026-07)
  const julBks = Object.entries(val).filter(([id,b]) => (b.date||'').startsWith('2026-07'));

  if (julBks.length === 0) {
    statusEl.textContent = '✅ ไม่มีคิวเดือนกรกฎาคมในระบบเลย';
    statusEl.className = 'status ok';
    return;
  }

  const suspects = julBks.filter(([id,b]) => b.date > todayStr && b.status === 'เสร็จแล้ว');
  statusEl.innerHTML = `พบคิวเดือนก.ค. ทั้งหมด ${julBks.length} คิว — วันนี้คือ ${todayStr}<br>
    ⚠️ พบ <b>${suspects.length}</b> คิวที่วันที่เป็นอนาคตแต่สถานะ "เสร็จแล้ว" (ตัวนี้แหละที่ทำให้ข้อมูลรายรับกลับมาใหม่ทุกครั้ง — ต้องแก้สถานะหรือลบทิ้ง)`;
  statusEl.className = suspects.length ? 'status warn' : 'status ok';

  julBks.sort((a,b)=> (a[1].date+a[1].time).localeCompare(b[1].date+b[1].time));

  listEl.innerHTML = julBks.map(([id,b]) => {
    const isSuspect = b.date > todayStr && b.status === 'เสร็จแล้ว';
    return `<div class="bk-card ${isSuspect?'suspect':''}" id="card-${id}">
      <div class="bk-head">
        <span>${isSuspect?'⚠️ ':''}${b.date} ${b.time||''} — ${b.name||'(ไม่มีชื่อ)'} — ${b.service||''} ฿${b.price||0} — สถานะ: <b>${b.status||'-'}</b> ${isSuspect?'<span class="bk-tag">อนาคต+เสร็จแล้ว</span>':''}</span>
        <span>
          ${isSuspect?`<button class="status-btn" onclick="window.resetStatus('${id}')">↩️ เปลี่ยนกลับเป็น "จอง"</button>`:''}
          <button onclick="window.deleteBooking('${id}')">🗑️ ลบคิวนี้ทิ้ง</button>
        </span>
      </div>
      <pre>${JSON.stringify(b, null, 2)}</pre>
    </div>`;
  }).join('');
}

window.resetStatus = async function(id) {
  const b = allBookings[id];
  if (!b) return;
  if (!confirm(`เปลี่ยนสถานะคิวของ "${b.name}" (${b.date}) กลับเป็น "จอง"?\n(การรายรับที่ถูกสร้างซ้ำจากคิวนี้จะหยุด แต่ต้องไปลบวันที่ตรงกันในหน้าสรุปยอดออกอีกครั้งด้วย)`)) return;
  await set(ref(db, `bookings/${id}/status`), 'จอง');
  alert('เปลี่ยนสถานะแล้วค่ะ — อย่าลืมไปลบข้อมูลวันที่ตรงกันในหน้าสรุปยอด (index.html) อีกรอบ');
  run();
};

window.deleteBooking = async function(id) {
  const b = allBookings[id];
  if (!confirm(`ยืนยันลบคิวของ "${b?.name}" (${b?.date}) ทิ้งทั้งหมด?`)) return;
  await remove(ref(db, `bookings/${id}`));
  document.getElementById(`card-${id}`).remove();
  alert('ลบคิวเรียบร้อยแล้วค่ะ');
};

run();
</script>
</body>
</html>
